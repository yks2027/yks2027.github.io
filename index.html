<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YKS 2027 Geri Sayım</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #05080f;
    --surface: #0a0f1e;
    --surface2: #0d1525;
    --border: rgba(80, 160, 255, 0.12);
    --border-hover: rgba(80, 160, 255, 0.35);
    --accent: #4da6ff;
    --accent2: #00d4ff;
    --accent3: #7b5fff;
    --text: #ddeeff;
    --muted: #3d5570;
  }

  html, body { width: 100%; height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .bg-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .bg-layer::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(77,100,255,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(0,212,255,0.05) 0%, transparent 50%),
      radial-gradient(ellipse 40% 50% at 20% 50%, rgba(123,95,255,0.04) 0%, transparent 50%);
  }

  .bg-layer::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(77,166,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(77,166,255,0.025) 1px, transparent 1px);
    background-size: 80px 80px;
    mask-image: radial-gradient(ellipse 90% 90% at center, black 30%, transparent 100%);
  }

  .horizon {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, var(--accent2) 30%, var(--accent) 50%, var(--accent3) 70%, transparent 100%);
    opacity: 0.25;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 40px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 9vw, 6.5rem);
    letter-spacing: 0.08em;
    line-height: 1;
    color: transparent;
    background: linear-gradient(120deg, #c8e6ff 0%, var(--accent2) 40%, var(--accent) 70%, var(--accent3) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    animation: fadeSlideDown 1s cubic-bezier(0.16,1,0.3,1) both;
    margin-bottom: 52px;
    filter: drop-shadow(0 0 40px rgba(77,166,255,0.15));
  }

  .countdown {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
    animation: fadeSlideUp 1s cubic-bezier(0.16,1,0.3,1) 0.2s both;
  }

  .box {
    position: relative;
    background: var(--surface);
    border-radius: 24px;
    min-width: 148px;
    overflow: hidden;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.4s;
    box-shadow: 0 0 0 1px var(--border), 0 20px 60px rgba(0,0,0,0.4);
  }

  .box:hover {
    transform: translateY(-6px) scale(1.02);
    box-shadow: 0 0 0 1px var(--border-hover), 0 30px 80px rgba(0,0,0,0.5), 0 0 40px rgba(77,166,255,0.08);
  }

  .box-inner {
    position: relative;
    padding: 32px 40px 24px;
  }

  .box-inner::before {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent2), var(--accent), transparent);
    opacity: 0.6;
    border-radius: 999px;
  }

  .box-inner::after {
    content: '';
    position: absolute;
    top: -20px; left: 50%;
    transform: translateX(-50%);
    width: 100px; height: 80px;
    background: radial-gradient(circle, rgba(77,166,255,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(4rem, 8vw, 5.8rem);
    line-height: 1;
    background: linear-gradient(160deg, #ffffff 0%, #b8d8ff 50%, var(--accent) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    display: block;
    letter-spacing: 0.04em;
  }

  .number.flip {
    animation: countFlip 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes countFlip {
    0%   { transform: scaleY(1) translateY(0); }
    40%  { transform: scaleY(0.8) translateY(-4px); opacity: 0.5; }
    100% { transform: scaleY(1) translateY(0); opacity: 1; }
  }

  .label {
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
    margin-top: 10px;
    display: block;
  }

  .sep {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding-bottom: 28px;
    opacity: 0;
    animation: sepAppear 1s ease 0.5s both;
  }

  .sep-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    animation: dotPulse 1.4s ease infinite;
    box-shadow: 0 0 8px var(--accent);
  }

  .sep-dot:last-child { animation-delay: 0.7s; }

  @keyframes dotPulse {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50% { opacity: 0.2; transform: scale(0.6); }
  }

  @keyframes sepAppear {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* Fullscreen button */
  .fs-wrap {
    margin-top: 44px;
    animation: fadeSlideUp 1s cubic-bezier(0.16,1,0.3,1) 0.4s both;
  }

  .fs-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 13px 32px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
    overflow: hidden;
  }

  .fs-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(77,166,255,0.07), rgba(0,212,255,0.04));
    opacity: 0;
    transition: opacity 0.3s;
    border-radius: inherit;
  }

  .fs-btn:hover {
    color: var(--accent2);
    border-color: rgba(0,212,255,0.3);
    transform: translateY(-3px) scale(1.04);
    box-shadow: 0 10px 36px rgba(0,0,0,0.35), 0 0 24px rgba(0,212,255,0.08);
  }

  .fs-btn:hover::before { opacity: 1; }
  .fs-btn:active { transform: scale(0.97); }

  .fs-icon {
    width: 15px; height: 15px;
    flex-shrink: 0;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }

  .fs-btn:hover .fs-icon { transform: scale(1.2) rotate(5deg); }

  /* Particles */
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .particle {
    position: absolute;
    border-radius: 50%;
    opacity: 0;
    animation: riseUp linear infinite;
  }

  @keyframes riseUp {
    0%   { opacity: 0; transform: translateY(0) scale(0); }
    8%   { opacity: 0.5; }
    92%  { opacity: 0.15; }
    100% { opacity: 0; transform: translateY(-100vh) scale(2); }
  }

  @keyframes fadeSlideDown {
    from { opacity: 0; transform: translateY(-24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 640px) {
    .box { min-width: 110px; }
    .box-inner { padding: 24px 24px 18px; }
    h1 { margin-bottom: 36px; }
    .fs-wrap { margin-top: 32px; }
  }
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="horizon"></div>
<div class="particles" id="particles"></div>

<div class="container">
  <h1>YKS 2027'ye Kalan Süre</h1>

  <div class="countdown">
    <div class="box">
      <div class="box-inner">
        <span class="number" id="days">000</span>
        <span class="label">Gün</span>
      </div>
    </div>

    <div class="sep">
      <span class="sep-dot"></span>
      <span class="sep-dot"></span>
    </div>

    <div class="box">
      <div class="box-inner">
        <span class="number" id="hours">00</span>
        <span class="label">Saat</span>
      </div>
    </div>

    <div class="sep">
      <span class="sep-dot"></span>
      <span class="sep-dot"></span>
    </div>

    <div class="box">
      <div class="box-inner">
        <span class="number" id="minutes">00</span>
        <span class="label">Dakika</span>
      </div>
    </div>

    <div class="sep">
      <span class="sep-dot"></span>
      <span class="sep-dot"></span>
    </div>

    <div class="box">
      <div class="box-inner">
        <span class="number" id="seconds">00</span>
        <span class="label">Saniye</span>
      </div>
    </div>
  </div>

  <div class="fs-wrap">
    <button class="fs-btn" id="fsBtn">
      <svg class="fs-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 3H5a2 2 0 0 0-2 2v3"/>
        <path d="M21 8V5a2 2 0 0 0-2-2h-3"/>
        <path d="M3 16v3a2 2 0 0 0 2 2h3"/>
        <path d="M16 21h3a2 2 0 0 0 2-2v-3"/>
      </svg>
      <span id="fsBtnText">Tam Ekran</span>
    </button>
  </div>
</div>

<script>
  // Particles
  const pContainer = document.getElementById('particles');
  const colors = ['#4da6ff', '#00d4ff', '#7b5fff'];
  for (let i = 0; i < 35; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.bottom = '-4px';
    p.style.animationDuration = (10 + Math.random() * 18) + 's';
    p.style.animationDelay = (Math.random() * 25) + 's';
    const s = 1 + Math.random() * 2.5;
    p.style.width = p.style.height = s + 'px';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    pContainer.appendChild(p);
  }

  // Countdown
  const target = new Date('2027-06-20T09:00:00');

  function pad(n, len = 2) {
    return String(Math.floor(n)).padStart(len, '0');
  }

  function animateFlip(el, val) {
    if (el.textContent !== val) {
      el.textContent = val;
      el.classList.remove('flip');
      void el.offsetWidth;
      el.classList.add('flip');
    }
  }

  function update() {
    const diff = target - new Date();
    if (diff <= 0) {
      document.querySelector('.countdown').innerHTML = '<p style="font-size:2rem;color:var(--accent2);font-family:Bebas Neue,sans-serif;letter-spacing:.1em">YKS Başladı! 🎉</p>';
      return;
    }
    animateFlip(document.getElementById('days'),    pad(Math.floor(diff / 86400000), 3));
    animateFlip(document.getElementById('hours'),   pad(Math.floor((diff % 86400000) / 3600000)));
    animateFlip(document.getElementById('minutes'), pad(Math.floor((diff % 3600000) / 60000)));
    animateFlip(document.getElementById('seconds'), pad(Math.floor((diff % 60000) / 1000)));
  }

  update();
  setInterval(update, 1000);

  // Fullscreen
  const fsBtn = document.getElementById('fsBtn');
  const fsBtnText = document.getElementById('fsBtnText');

  const enterPaths = `<path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/>`;
  const exitPaths  = `<path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/>`;

  fsBtn.addEventListener('click', () => {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
    } else {
      document.exitFullscreen();
    }
  });

  document.addEventListener('fullscreenchange', () => {
    const isFs = !!document.fullscreenElement;
    fsBtn.querySelector('.fs-icon').innerHTML = isFs ? exitPaths : enterPaths;
    fsBtnText.textContent = isFs ? 'Küçült' : 'Tam Ekran';
  });
</script>
</body>
</html>
