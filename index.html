<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YKS 2027 Geri Sayım</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080b12;
    --surface: #0e1420;
    --border: rgba(99, 179, 255, 0.15);
    --accent: #3b9eff;
    --accent2: #00e5ff;
    --text: #e8f4ff;
    --muted: #4a6080;
    --glow: rgba(59, 158, 255, 0.4);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,158,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,158,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridMove 20s linear infinite;
    pointer-events: none;
  }

  @keyframes gridMove {
    0% { transform: translateY(0); }
    100% { transform: translateY(60px); }
  }

  /* Radial glow center */
  body::after {
    content: '';
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 700px;
    height: 700px;
    background: radial-gradient(ellipse, rgba(59,158,255,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 40px 20px;
  }

  /* Badge */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(59,158,255,0.08);
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 6px 20px;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 28px;
    animation: fadeDown 0.8s ease both;
  }

  .badge-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent2);
    animation: pulse 1.5s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  /* Main title */
  h1 {
    margin-top: -40px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.8rem, 8vw, 6rem);
    letter-spacing: 0.06em;
    line-height: 1;
    background: linear-gradient(135deg, #ffffff 0%, var(--accent2) 50%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
    animation: fadeDown 0.9s ease both 0.1s;
  }

  .subtitle {
    font-size: 1rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 60px;
    animation: fadeDown 1s ease both 0.2s;
  }

  /* Countdown boxes */
  .countdown {
    display: flex;
    gap: 24px;
    justify-content: center;
    flex-wrap: wrap;
    animation: fadeUp 1s ease both 0.4s;
  }

  .box {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 44px 28px;
    min-width: 160px;
    overflow: hidden;
    transition: border-color 0.3s, transform 0.3s;
  }

  .box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
    opacity: 0.7;
  }

  .box::after {
    content: '';
    position: absolute;
    bottom: -60px; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 120px;
    background: radial-gradient(circle, rgba(59,158,255,0.12), transparent 70%);
    pointer-events: none;
  }

  .box:hover {
    border-color: rgba(99, 179, 255, 0.4);
    transform: translateY(-4px);
  }

  .number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3.5rem, 8vw, 5.5rem);
    line-height: 1;
    background: linear-gradient(180deg, #ffffff 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    display: block;
    transition: transform 0.15s;
  }

  .number.flip {
    animation: countFlip 0.25s ease;
  }

  @keyframes countFlip {
    0% { transform: scaleY(1); }
    50% { transform: scaleY(0.85); opacity: 0.6; }
    100% { transform: scaleY(1); }
  }

  .label {
    font-size: 0.78rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 700;
    margin-top: 10px;
    display: block;
  }

  /* Separator dots */
  .sep {
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: center;
    justify-content: center;
    padding-top: 10px;
    color: var(--accent);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.5rem;
    opacity: 0.5;
    animation: sepBlink 1s ease infinite;
  }

  @keyframes sepBlink {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 0.15; }
  }

  /* Date info */
  .date-info {
    margin-top: 50px;
    font-size: 0.85rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    animation: fadeUp 1s ease both 0.6s;
  }

  .date-info span {
    color: var(--accent);
    font-weight: 700;
  }

  /* Floating particles */
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .particle {
    position: absolute;
    width: 2px; height: 2px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0;
    animation: rise linear infinite;
  }

  @keyframes rise {
    0% { opacity: 0; transform: translateY(0) scale(0); }
    10% { opacity: 0.6; }
    90% { opacity: 0.3; }
    100% { opacity: 0; transform: translateY(-100vh) scale(1.5); }
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .box { min-width: 120px; padding: 28px 28px 20px; }
    .sep { display: none; }
    h1 { font-size: 2.8rem; }
  }
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="container">
  <h1>YKS 2027'ye Kalan Süre</h1>

  <div class="countdown">
    <div class="box">
      <span class="number" id="days">000</span>
      <span class="label">Gün</span>
    </div>
    <div class="sep">:</div>
    <div class="box">
      <span class="number" id="hours">00</span>
      <span class="label">Saat</span>
    </div>
    <div class="sep">:</div>
    <div class="box">
      <span class="number" id="minutes">00</span>
      <span class="label">Dakika</span>
    </div>
    <div class="sep">:</div>
    <div class="box">
      <span class="number" id="seconds">00</span>
      <span class="label">Saniye</span>
    </div>
  </div>


</div>

<script>
  // Particles
  const container = document.getElementById('particles');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.bottom = '0';
    const dur = 8 + Math.random() * 15;
    p.style.animationDuration = dur + 's';
    p.style.animationDelay = Math.random() * 20 + 's';
    p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
    p.style.opacity = 0;
    container.appendChild(p);
  }

  // Countdown
  const target = new Date('2027-06-20T09:00:00');

  function pad(n, len = 2) {
    return String(Math.floor(n)).padStart(len, '0');
  }

  function animateFlip(el, newVal) {
    if (el.textContent !== newVal) {
      el.textContent = newVal;
      el.classList.remove('flip');
      void el.offsetWidth;
      el.classList.add('flip');
    }
  }

  function update() {
    const now = new Date();
    const diff = target - now;

    if (diff <= 0) {
      document.querySelector('.countdown').innerHTML = '<p style="font-size:2rem;color:var(--accent2)">YKS Başladı! 🎉</p>';
      return;
    }

    const days    = Math.floor(diff / 86400000);
    const hours   = Math.floor((diff % 86400000) / 3600000);
    const minutes = Math.floor((diff % 3600000) / 60000);
    const seconds = Math.floor((diff % 60000) / 1000);

    animateFlip(document.getElementById('days'),    pad(days, 3));
    animateFlip(document.getElementById('hours'),   pad(hours));
    animateFlip(document.getElementById('minutes'), pad(minutes));
    animateFlip(document.getElementById('seconds'), pad(seconds));
  }

  update();
  setInterval(update, 1000);
</script>
</body>
</html>
